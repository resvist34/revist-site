backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "uploads"
public_folder: "/uploads"

site_url: "https://willowy-crumble-acbbce.netlify.app"
display_url: "https://willowy-crumble-acbbce.netlify.app"
logo_url: "/logo.jpg"

collections:
  - name: "site_content"
    label: "Site İçeriği"
    files:
      - label: "Ana İçerik"
        name: "main_content"
        file: "content/site.json"
        fields:
          - { label: "Hero Üst Yazı", name: "eyebrow", widget: "string" }
          - { label: "Ana Başlık", name: "hero_title", widget: "string" }
          - { label: "Ana Açıklama", name: "hero_text", widget: "text" }
          - label: "İstatistikler"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Değer", name: "value", widget: "string" }
              - { label: "Metin", name: "label", widget: "string" }

  - name: "events"
    label: "Etkinlikler"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Etkinlik Başlığı", name: "title", widget: "string" }
      - { label: "Rozet", name: "badge", widget: "string" }
      - { label: "Açıklama", name: "description", widget: "text" }
      - { label: "Konum", name: "location", widget: "string" }
      - { label: "Format", name: "format", widget: "string" }
      - { label: "İçerik", name: "content_type", widget: "string" }
      - { label: "Görsel", name: "image", widget: "image" }

  - name: "gallery"
    label: "Galeri"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Başlık", name: "title", widget: "string", required: false }
      - { label: "Fotoğraf", name: "image", widget: "image" }
