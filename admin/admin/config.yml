backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "events"
    label: "Etkinlikler"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Açıklama", name: "description", widget: "text" }
      - { label: "Fotoğraf", name: "image", widget: "image", required: false }

  - name: "site"
    label: "Site Yazıları"
    files:
      - label: "Ana Sayfa"
        name: "home"
        file: "content/site.json"
        fields:
          - { label: "Üst Yazı", name: "eyebrow", widget: "string" }
          - { label: "Başlık", name: "hero_title", widget: "string" }
          - { label: "Açıklama", name: "hero_text", widget: "text" }
